<HTML>
<BODY BGCOLOR='#FFFFFF'>
<NOSCRIPT>
Your browser must support JavaScript for the simulator to work.
</NOSCRIPT>
<FORM>
<TABLE ALIGN=center>
<TR VALIGN=center>
<TD ROWSPAN=2>
Time steps:
<INPUT TYPE=button VALUE='-25' ONCLICK='changeSteps(-25)'>
<INPUT TYPE=button VALUE='-10' ONCLICK='changeSteps(-10)'>
<INPUT TYPE=button VALUE='-5'  ONCLICK='changeSteps(-5)'>
<INPUT TYPE=button VALUE='-1'  ONCLICK='changeSteps(-1)'>
<INPUT SIZE=3 VALUE='1' NAME=steps>
<INPUT TYPE=button VALUE='+1'  ONCLICK='changeSteps(1)'>
<INPUT TYPE=button VALUE='+5'  ONCLICK='changeSteps(5)'>
<INPUT TYPE=button VALUE='+10' ONCLICK='changeSteps(10)'>
<INPUT TYPE=button VALUE='+25' ONCLICK='changeSteps(25)'>
</TD>
<TD ROWSPAN=2 WIDTH=20></TD>
<TD ROWSPAN=2 ALIGN=left><INPUT TYPE=button VALUE=Redraw ONCLICK='redraw()'></TD>
<TD ROWSPAN=2 WIDTH=100></TD>
<TD ALIGN=center>&middot;</TD>
<TD ALIGN=left>= false</TD>
</TR>
<TR>
<TD ALIGN=center><B>T</B></TD>
<TD ALIGN=left>= true</TD>
</TR>
</TABLE>

<SCRIPT LANGUAGE='JavaScript'><!--
var nil = "<FONT COLOR='#CC0000'><B>nil</B></FONT>";
var steps = 1;
drawTable( steps, initialInputs(steps) );

// javascript lib
// begin
// generating html
function println( s )
{
  parent.signals.document.writeln(s);
}

function print( s )
{
  parent.signals.document.write(s);
}

// computation -- helper functions
function ifThenElse( c, x, y )
{
  if ( c == 1 )
    return x;
  else if ( c == 0 )
    return y;
  else
    return NaN;
}

function boolOr( x, y )
{
  if ( x == 1 ) return 1;
  if ( y == 1 ) return 1;
  return x+y;
}

function boolAnd( x, y )
{
  if ( x == 0 ) return 0;
  if ( y == 0 ) return 0;
  return x+y-1;
}

function castBool( b )
{
  if ( b ) return 1; else return 0;
}

function equal( n, m )
{
  return ( isNaN(n) ? NaN
         : isNaN(m) ? NaN
         : n == m   ? 1
         : 0
         );
}

function less( n, m )
{
  return ( isNaN(n) ? NaN
         : isNaN(m) ? NaN
         : n < m    ? 1
         : 0
         );
}

function div( n, m )
{
  var ans;
  
  if ( m == 0 )
    return NaN;
  
  ans = n / m;
  return ( ans < 0
         ? Math.ceil( ans )
         : Math.floor( ans )
         );
}

// getting form information
function getSteps()
{
  var steps_ = parseInt(document.forms[0].steps.value);
  steps_ = steps_ >= 1 ? steps_ : 1;
  document.forms[0].steps.value = steps_;
  return steps_;
}

function changeSteps( delta )
{
  document.forms[0].steps.value = Math.max(1,getSteps() + delta);
  redraw();
}

// redrawing
function redraw()
{
  var inputs_;
  var steps_ = getSteps();
  inputs_ = retrieveInputs(steps,steps_);
  drawTable( steps_, inputs_ );
  steps = steps_;
  parent.signals.document.close();
}

// drawing
function showBoolInp( sig, t, x )
{
  return "<INPUT TYPE=checkbox NAME='" + sig + ":" + t + "' "
       + (x == 1 ? "CHECKED" : "")
       + ">"
}

function showIntInp( sig, t, x )
{
  var s = "" + x;
  return "<INPUT SIZE=1 NAME='" + sig + ":" + t + "' "
       + "VALUE='" + (s == "NaN" ? "" : s)
       + "'>"
}

function showBool( x )
{
  if ( x == 0 )
    return "&middot;"
  else if ( x == 1 )
    return "<B>T</B>" // "<B>&times;</B>"
  else
    return nil;
}

function showInt( x )
{
  var s = "" + x;
  return s == "NaN" ? nil : s;
}

function drawSignalInp( steps, name, color, show, table, sig )
{
  var t;
  
  print( "<TR ALIGN=center BGCOLOR='" + color + "'>"
       + "<TD ALIGN=right>" + name + "</TD>"
       );  
  
  for( t = 1; t <= steps; t++ )
  {
    print( "<TD>" + show( sig, t, table[t][sig] ) + "</TD>" );
  }

  println( "</TR>" );  
}

function drawSignal( steps, name, color, show, table, sig )
{
  var t;
  
  print( "<TR ALIGN=center BGCOLOR='" + color + "'>"
       + "<TD ALIGN=right>" + name + "</TD>"
       );  
  
  for( t = 1; t <= steps; t++ )
  {
    print( "<TD>" + show( table[t][sig] ) + "</TD>" );
  }

  println( "</TR>" );  
}

function drawCells( steps )
{
  print( "<TR ALIGN=center>"
       + "<TD><FONT COLOR='#FFFFFF'>xxxxxxxxxx</FONT></TD>"
       );  
  
  for( t = 1; t <= steps; t++ )
  {
    print( "<TD WIDTH=35> </TD>" );
  }

  println( "</TR>" );  
}

function drawSeparator( steps )
{
  print( "<TR><TD COLSPAN='" + (steps+1) + "'> <BR> </TD></TR>"
       + "<TR><TD HEIGHT=2 BGCOLOR='#AFAFAF' COLSPAN='" + (steps+1)
       + "'></TD></TR>"
       );
}

function drawNodeName( steps, name )
{
  print( "<TR><TD ALIGN=left COLSPAN='" + (steps+1) + "'>"
       + "<B>node</B> " + name 
       + "</TD></TR>"
       );
}

function drawLine( steps, s )
{
  print( "<TR><TD ALIGN=left COLSPAN='" + (steps+1) + "'>"
       + s
       + "</TD></TR>"
       );
}

function drawTimes( steps )
{
  print( "<TR ALIGN=center>"
       + "<TD ALIGN=right><FONT SIZE=-1>time</FONT></TD>"
       );  
  
  for( t = 1; t <= steps; t++ )
  {
    print( "<TD><B><FONT SIZE=-1>" + t + "</FONT></B></TD>" );
  }

  println( "</TR>" );  
}

function drawTable( steps, inputs )
{
  var t
    , table = new Array(steps)
    , state0 = new Object
    , state1 = new Object;
  
  for ( t = 1; t <= steps; t++ )
    table[t] = new Object;
  
  initialize( state0 );
  
  for( t = 1; t <= steps; t++ )
  {
    transition( inputs[t], state0, table[t], state1 );
    state0 = state1;
  }

  println("<TABLE CELLSPACING=2>");
  drawCells( steps );
  drawContents( steps, table );
  println("</TABLE>");

  parent.signals.document.close();
}
// end

// initial inputs
function initialInputs( steps )
{
  var ninputs;

  ninputs = new Array( steps );

  ninputs[1] = new Object;
  ninputs[1].x1 = 1;

  return ninputs;
}

// retrieving inputs
function retrieveInputs( steps, steps_ )
{
  var t, msteps, ninputs;

  msteps  = Math.max(steps,steps_);
  ninputs = new Array( msteps );

  for( t = 1; t <= msteps; t++ )
  {
    ninputs[t] = new Object;
  }

  for( t = 1; t <= steps; t++ )
  {
    ninputs[t].x1 = parent.signals.document.forms[0]["x1:"+t].checked ? 1 : 0;
  }

  for( t = steps+1; t <= steps_; t++ )
  {
    ninputs[t].x1 = 0;
  }

  return ninputs;
}

function chop( n )
{
  return ( n >  7 ? NaN
         : n < -8 ? NaN
         : n
         );
}

// state initialization
function initialize( st )
{
  st.start = 1;
  st.x9 = NaN;
  st.x10 = NaN;
}

// state transition
function transition( inp, st0, sig, st1 )
{
  // signals
  sig.x1 = inp.x1;
  sig.x9 = st0.x9;
  sig.x5 = ifThenElse(st0.start,0,sig.x9);
  sig.x10 = st0.x10;
  sig.x6 = ifThenElse(st0.start,chop(0),sig.x10);
  sig.x7 = ifThenElse((1-sig.x5),ifThenElse(sig.x1,1,0),ifThenElse(boolOr(sig.x1,(1-less(sig.x6,chop(10)))),0,1));
  sig.x8 = ifThenElse(sig.x7,ifThenElse((1-sig.x5),chop(0),chop(sig.x6+chop(1))),chop(0));
  sig.x4 = boolOr((1-sig.x7),less(chop(0),sig.x8));

  // next state
  st1.start = 0;
  st1.x9 = sig.x7;
  st1.x10 = sig.x8;
}

// visualization
function drawContents( steps, table )
{
  // node ["verify1"]
  println('<FORM>');
  println('<A NAME="verify1"></A>');
  drawNodeName( steps, 'verify1' );
  drawTimes( steps );
  drawSignalInp( steps, 'press', '#CCCCFF', showBoolInp, table, 'x1');
  println('</FORM>');
  drawSignal( steps, 'ok', '#CCFFCC', showBool, table, 'x4' );
  drawSignal( steps, 'mode', '#DDDFDF', showBool, table, 'x7' );
  drawSignal( steps, 'x', '#DDDFDF', showInt, table, 'x8' );

  // node ["verify1","switch"]
  drawSeparator( steps );
  println('<A NAME="verify1-switch"></A>');
  drawNodeName( steps, 'switch <FONT SIZE=-1>( verify1 / )</FONT>' );
  drawTimes( steps );
  drawSignal( steps, 'press', '#CCCCFF', showBool, table, 'x1' );
  drawSignal( steps, 'mode', '#CCFFCC', showBool, table, 'x7' );
  drawSignal( steps, 'x', '#CCFFCC', showInt, table, 'x8' );
  drawSignal( steps, 'mode_prev', '#DDDFDF', showBool, table, 'x5' );
  drawSignal( steps, 'x_prev', '#DDDFDF', showInt, table, 'x6' );
}

// --></SCRIPT>
</HTML>
